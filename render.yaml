services:
  - type: web
    name: portfolio-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn portfolio_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "portfolio-backend.onrender.com"
      - key: DB_ENGINE
        value: "django.db.backends.sqlite3"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-project.vercel.app"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: GITHUB_API_TOKEN
        sync: false
    healthCheckPath: /api/profil/
    autoDeploy: true
