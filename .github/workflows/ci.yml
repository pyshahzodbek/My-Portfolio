# CI Pipeline - Portfolio loyihasi
# Har commitda va PR da ishlaydi

name: CI Pipeline

# Qachon ishga tushadi
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Jobs
jobs:
  # Linting - Kod sifatini tekshirish
  lint:
    name: Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Kodni checkout qilish
        uses: actions/checkout@v4
      
      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Kutubxonalarni o'rnatish
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Flake8 bilan tekshirish
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=10 --max-line-length=127 --statistics

  # Test - Testlarni ishga tushirish
  test:
    name: Testlar
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      # PostgreSQL xizmati
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Kodni checkout qilish
        uses: actions/checkout@v4
      
      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Kutubxonalarni o'rnatish
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Testlarni ishga tushirish
        env:
          SECRET_KEY: test-secret-key
          DEBUG: True
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          cd backend
          python -m pytest --tb=short

  # Docker - Konteyner yaratish
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Kodni checkout qilish
        uses: actions/checkout@v4
      
      - name: Docker Buildx o'rnatish
        uses: docker/setup-buildx-action@v3
      
      - name: Docker konteynerni yaratish
        run: |
          cd backend
          docker build -t portfolio-backend:${{ github.sha }} .
          docker build -t portfolio-backend:latest .
      
      - name: Docker konteynerni tekshirish
        run: |
          docker run --rm portfolio-backend:${{ github.sha }} python manage.py check

  # Frontend tekshirish
  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Kodni checkout qilish
        uses: actions/checkout@v4
      
      - name: HTML tekshirish
        run: |
          # HTML fayllarni tekshirish (ixtiyoriy)
          find frontend -name "*.html" -exec echo "Checking: {}" \;
      
      - name: CSS tekshirish
        run: |
          # CSS fayllarni tekshirish (ixtiyoriy)
          find frontend -name "*.css" -exec echo "Checking: {}" \;
      
      - name: JavaScript tekshirish
        run: |
          # JS fayllarni tekshirish (ixtiyoriy)
          find frontend -name "*.js" -exec echo "Checking: {}" \;

  # Xabar berish
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, test, docker, frontend]
    if: always()
    
    steps:
      - name: Natija haqida xabar
        run: |
          echo "CI Pipeline natijalari:"
          echo "Linting: ${{ needs.lint.result }}"
          echo "Testlar: ${{ needs.test.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          
          if [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.docker.result }}" == "failure" ]; then
            echo "❌ CI Pipeline xatolik bilan tugadi!"
            exit 1
          else
            echo "✅ CI Pipeline muvaffaqiyatli tugadi!"
          fi
