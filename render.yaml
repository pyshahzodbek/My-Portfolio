services:
  - type: web
    name: portfolio-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn portfolio_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DB_ENGINE
        value: "django.db.backends.postgresql"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: GITHUB_API_TOKEN
        sync: false
    healthCheckPath: /api/profil/
