# Docker Compose - Rivojlantirish muhiti
# SQLite ishlatiladi (PostgreSQL o'rnatish shart emas)

version: '3.8'

services:
  # Django backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: portfolio_backend_dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-dev-key
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_ENGINE=django.db.backends.sqlite3
      - DB_NAME=/app/db.sqlite3
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5500,http://localhost:80
    restart: unless-stopped

  # Frontend (ixtiyoriy)
  frontend:
    image: nginx:alpine
    container_name: portfolio_frontend_dev
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: unless-stopped

# Volumelar
volumes:
  media_data:
